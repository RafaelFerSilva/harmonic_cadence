[project]
name = "harmonic-analysis"
version = "0.1.0"
description = "Análise harmônica de músicas brasileiras"
requires-python = ">=3.12"
dependencies = [
    "cifra-core",
    "tqdm>=4.67",
    "requests>=2.31",
    "duckdb>=1.0",
]

[project.optional-dependencies]
# Provider in-process: traz o scraper pesado (flask/bs4/lxml). Sem este extra,
# uma instalação só-HTTP permanece enxuta.
inprocess = ["cifra-scraper"]
# Explainer por LLM (opt-in). Provedores OpenAI-compatíveis (OpenRouter, Ollama)
# usam o cliente `openai`; o Claude usa a SDK `anthropic`. Sem este extra, o
# explainer padrão (template, offline) continua funcionando.
explain-llm = ["openai>=1.0", "anthropic>=0.40"]

[project.scripts]
harmonic = "harmonic_analysis.cli.main:main"

[tool.uv.sources]
cifra-core = { workspace = true }
cifra-scraper = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.11"]
build-backend = "uv_build"
